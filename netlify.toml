[build]
  command   = "bash scripts/netlify-build.sh"
  publish   = "_site"

[build.environment]
  QUARTO_VERSION = "1.8.24"

# Redirects from the old Hexo-based site (pre-migration URL structure).
# Google still has these indexed; without redirects they 404 and the old
# ranking/link equity is lost instead of transferred to the new pages.

# Confirmed 1:1 content matches
[[redirects]]
  from   = "/posts/2024-06-23-latex-first-doc/"
  to     = "/articles/posts/latex/first-doc/latex-first-doc.html"
  status = 301
  force  = true

[[redirects]]
  from   = "/posts/2024-06-24-latex-setting/"
  to     = "/articles/posts/latex/basic-setting/latex-basic-setting.html"
  status = 301
  force  = true

# Old Hexo hub/listing pages -> closest equivalent on the new site
[[redirects]]
  from   = "/archives/"
  to     = "/articles/index.html"
  status = 301
  force  = true

[[redirects]]
  from   = "/archives/*"
  to     = "/articles/index.html"
  status = 301
  force  = true

[[redirects]]
  from   = "/categories/*"
  to     = "/articles/index.html"
  status = 301
  force  = true

[[redirects]]
  from   = "/page/*"
  to     = "/articles/index.html"
  status = 301
  force  = true

# Remaining old dated posts with no current equivalent content -> articles hub
# (better than a bare 404 for retained link equity; content itself was retired
# in the migration rather than 1:1 ported)
[[redirects]]
  from   = "/posts/*"
  to     = "/articles/index.html"
  status = 301
  force  = true
