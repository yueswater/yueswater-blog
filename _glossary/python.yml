變數: |
  Python 中用來指向物件的名字（標籤）。賦值時，Python 將名字綁定到物件，而非複製值。

物件: |
  Python 中一切皆物件。每個物件擁有型別、值與引用計數三個屬性。

型別: |
  決定一個物件能做什麼操作、佔多少記憶體。Python 的內建基本型別包含 `int`、`float`、`str`、`bool`、`None`。

int: |
  整數型別。Python 的 `int` 沒有大小上限（arbitrary precision），可直接計算極大的數字。

float: |
  浮點數型別。遵循 IEEE 754 雙精度標準，存在精度誤差（例如 `0.1 + 0.2 != 0.3`）。

str: |
  字串型別。不可變的 Unicode 字元序列，支援 f-string、`strip()`、`replace()` 等操作。

bool: |
  布林型別，是 `int` 的子類別。`True` 等於 `1`，`False` 等於 `0`。

None: |
  代表「沒有值」的特殊物件，是 `NoneType` 的唯一實例（singleton）。比較時應使用 `is` 而非 `==`。

型別標註: |
  在變數、函式參數或回傳值旁加上型別資訊（如 `x: int = 5`）。Python 不強制執行，但有助於靜態分析工具（如 mypy）進行檢查。

f-string: |
  格式化字串字面值（Formatted String Literal），Python 3.6 引入。語法為 `f"..."` 或 `f'...'`，可在大括號內嵌入任意運算式。
